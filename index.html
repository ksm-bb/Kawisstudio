<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
  
  <link rel="apple-touch-icon" href="https://i.ibb.co/zhyqHKyV/crown-1f451.png">
  <link rel="icon" sizes="192x192" href="https://i.ibb.co/zhyqHKyV/crown-1f451.png">
  <link rel="shortcut icon" href="https://i.ibb.co/zhyqHKyV/crown-1f451.png">
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect, useCallback } = React;

    const IconPlus = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
    const IconHome = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>;
    const IconSearch = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>;
    const IconClock = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>;
    const IconCheck = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"></polyline></svg>;
    const IconFileText = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>;
    const IconCalendar = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>;
    const IconLoader = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>;
    const IconEye = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>;
    const IconEyeOff = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>;
    const IconImage = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>;
    const IconList = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>;
    const IconChevronLeft = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="15 18 9 12 15 6"></polyline></svg>;
    const IconChevronRight = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="9 18 15 12 9 6"></polyline></svg>;
    const IconTrash = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>;
    const IconFastForward = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="13 19 22 12 13 5 13 19"></polygon><polygon points="2 19 11 12 2 5 2 19"></polygon></svg>;

    const COLORS = {
      blue: '#FFD2E6',
      pink: '#FBDFE8',
      purple: '#D4D6F5',
      orange: '#FFD3EF',
      bg: '#fff5fa',
      white: '#FFD2E6',
      textMain: '#E86D9C',
      textSoft: '#6E75D9',
      pinkDeep: '#E86D9C',
      blueDeep: '#454CB6',
      purpleDeep: '#6E75D9',
      orangeDeep: '#E86D9C',
      cardBg: '#FFF0F8',
      cardBgDone: '#E8ECFF',
      cardWhite: '#ffffff',
      cardBorder: '#FFD2E6',
      cardInner: '#FFF5F9',
      cloudWhite: '#ffffff',
      modalBg: '#ffffff',
      navBarBg: '#ffffff',
      profileBorder: '#FFD2E6',
      buttonBg: '#ffffff',
      dividerColor: '#FFD2E6',
      emptyStateBg: '#FFF5F9',
      calendarBg: '#ffffff',
      searchInputBg: '#ffffff',
      filterBarBg: '#FFF0F6',
      bannerOverlayBg: '#ffffff',
      progressBarBlue: '#454CB6',
      progressBg: '#D4D6F5',
    };

    const TASK_STATUSES = [
      { id: 'status_1', label: 'รอช่างก่อนนะคะ', percent: 20, img: 'https://i.ibb.co/TxTf5F3C/1.png' },
      { id: 'status_2', label: 'กำลังขึ้นโครง', percent: 40, img: 'https://i.ibb.co/V0q8R2X5/2.png' },
      { id: 'status_3', label: 'ขึ้นหลังคา', percent: 60, img: 'https://i.ibb.co/4Z1YN98V/3.png' },
      { id: 'status_4', label: 'เก็บรายละเอียด', percent: 80, img: 'https://i.ibb.co/sDCtFkC/4.png' },
      { id: 'status_5', label: 'เสร็จสมบูรณ์', percent: 100, img: 'https://i.ibb.co/S45V8XSb/5.png' }
    ];

    const FluffyCloud = React.memo(({ top, left, right, bottom, scale = 1, opacity = 0.7, delay = '0s', reverse = false }) => (
      <div className="absolute pointer-events-none drop-shadow-sm z-0" style={{ top, left, right, bottom, opacity, transform: `scale(${scale})` }}>
        <div className={reverse ? 'animate-float-reverse' : 'animate-float'} style={{ animationDelay: delay }}>
          <div className="relative w-40 h-16">
            <div className="absolute bottom-0 left-4 w-32 h-10 rounded-full" style={{ backgroundColor: `${COLORS.cloudWhite}e6` }}></div>
            <div className="absolute bottom-2 left-2 w-14 h-14 rounded-full" style={{ backgroundColor: `${COLORS.cloudWhite}e6` }}></div>
            <div className="absolute bottom-5 left-10 w-16 h-16 rounded-full" style={{ backgroundColor: `${COLORS.cloudWhite}e6` }}></div>
            <div className="absolute bottom-1 right-2 w-14 h-14 rounded-full" style={{ backgroundColor: `${COLORS.cloudWhite}e6` }}></div>
          </div>
        </div>
      </div>
    ));

    const DynamicBackground = React.memo(() => (
      <div className="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <div className="absolute top-[10%] left-[-10%] w-72 h-72 rounded-full blur-[90px] opacity-40 animate-float" style={{ backgroundColor: COLORS.pink }}></div>
        <div className="absolute bottom-[10%] right-[-10%] w-80 h-80 rounded-full blur-[100px] opacity-30 animate-float-reverse" style={{ backgroundColor: '#D4D6F5' }}></div>
        <div className="absolute top-[40%] right-[10%] w-48 h-48 rounded-full blur-[80px] opacity-25 animate-float" style={{ backgroundColor: '#FFD3EF' }}></div>
        <FluffyCloud top="8%" left="-5%" scale={1.5} opacity={0.6} delay="0s" />
        <FluffyCloud top="35%" left="-15%" scale={2.5} opacity={0.3} delay="2.5s" />
        <FluffyCloud bottom="20%" left="5%" scale={1.6} opacity={0.6} delay="3s" />
        <FluffyCloud top="50%" right="-5%" scale={1.8} opacity={0.5} delay="1s" reverse={true} />
      </div>
    ));

    const Header = React.memo(({ isAdmin, setIsAdmin, setShowAuthModal, handleImageUpload, profileImage }) => (
      <div className="px-5 pt-6 pb-2 relative z-10">
        <div className="backdrop-blur-md rounded-[32px] p-4 shadow-xl shadow-[#E86D9C]/20 flex items-center justify-between h-20 relative overflow-hidden group" style={{ backgroundColor: `${COLORS.cardWhite}66`, borderWidth: '1px', borderColor: `${COLORS.cardBorder}80` }}>
          <div className="absolute left-6 top-1/2 -translate-y-1/2 w-24 h-8 bg-[#FFD2E6]/50 blur-xl rounded-full"></div>
          <div className="flex flex-col justify-center ml-2 relative z-10">
            <div className="flex items-center gap-1">
             <h1 className="text-2xl font-black italic tracking-tighter flex">
              {"KAWIS STUDIO".split('').map((char, index) => (
                <span
                  key={index}
                  className={`bg-gradient-to-br from-[#454CB6] to-[#6E75D9] bg-clip-text text-transparent drop-shadow-sm inline-block animate-text-wave pb-2 ${char === ' ' ? 'w-2.5' : 'pr-[1.5px]'}`}
                  style={{ animationDelay: `${index * 0.1}s` }}
                >
                  {char}
                </span>
              ))}
             </h1>
              <button onClick={() => isAdmin ? setIsAdmin(false) : setShowAuthModal(true)} className={`px-1.5 py-0.5 ml-1 rounded-full text-[7px] font-black uppercase tracking-widest border shadow-sm transition-all active:scale-95`} style={{ backgroundColor: isAdmin ? `${COLORS.buttonBg}99` : `${COLORS.buttonBg}cc`, color: isAdmin ? '#E86D9C' : '#9ca3af', borderColor: isAdmin ? '#FFD2E6' : '#e5e7eb' }}>
                {isAdmin ? 'Admin' : 'Guest'}
              </button>
            </div>
            <div className="flex items-center gap-1.5 opacity-70">
              <div className="w-3 h-[1px]" style={{ backgroundColor: COLORS.pinkDeep }}></div>
              <p className="text-[8px] font-black tracking-[0.5em] uppercase" style={{ color: COLORS.purpleDeep }}>Check Q</p>
            </div>
          </div>
          <div onClick={isAdmin ? handleImageUpload : undefined} className={`w-16 h-16 rounded-[1.25rem] flex items-center justify-center relative overflow-hidden transition-transform ${isAdmin ? 'cursor-pointer hover:scale-105 active:scale-95' : ''}`} style={{ backgroundColor: COLORS.cardInner, borderWidth: '2px', borderColor: COLORS.profileBorder }}>
            {profileImage ? (
              <img src={profileImage} alt="Profile" className="w-full h-full object-cover" />
            ) : (
              <>
                <div className="absolute inset-0 opacity-40" style={{ background: `linear-gradient(to top right, ${COLORS.pink}, #D4D6F5)` }}></div>
                <span className="text-2xl relative z-10 select-none">🐰</span>
              </>
            )}
          </div>
        </div>
      </div>
    ));

    // ==========================================
    // ProgressHouse — แทน ProgressFlower
    // ==========================================
    const ProgressHouse = React.memo(({ progress, todayTasksLength, doneToday, triggerBounce, isBouncing }) => {
      const isComplete = progress === 100 && todayTasksLength > 0;

      // step ปัจจุบัน 0-5 (0 = ยังไม่เริ่ม, 5 = เสร็จสมบูรณ์)
      const step = todayTasksLength === 0 ? 0 : Math.ceil((progress / 100) * 5);

      // สีหลัก
      const pink = '#E86D9C';
      const blue = '#454CB6';
      const purple = '#6E75D9';
      const softPink = '#FFD2E6';
      const softBlue = '#D4D6F5';
      const cream = '#FFF5F9';
      const brown = '#C9956B';
      const softBrown = '#E8C8A8';

      return (
        <div
          onClick={triggerBounce}
          className={`backdrop-blur-sm rounded-[28px] p-3 flex flex-col items-center justify-center shadow-lg shadow-[#E86D9C]/20 h-full relative overflow-hidden transition-all duration-300 cursor-pointer ${isBouncing ? 'scale-95' : 'hover:scale-[1.02]'}`}
          style={{ backgroundColor: `${COLORS.cardWhite}cc`, borderWidth: '1px', borderColor: COLORS.cardBorder }}
        >


          {/* sparkles เมื่อเสร็จ */}
          {isComplete && (
            <div className="absolute inset-0 pointer-events-none overflow-hidden">
              <div className="absolute top-3 left-5 w-1.5 h-1.5 rounded-full animate-float-particle-1" style={{ backgroundColor: pink, opacity: 0.8 }}></div>
              <div className="absolute top-4 right-6 w-1 h-1 rounded-full animate-float-particle-2" style={{ backgroundColor: blue, opacity: 0.8 }}></div>
              <div className="absolute bottom-8 left-8 w-2 h-2 rounded-full animate-float-particle-3" style={{ backgroundColor: purple, opacity: 0.7 }}></div>
            </div>
          )}

          {/* SVG บ้าน */}
          <div className="relative w-full flex items-center justify-center mt-3" style={{ height: '76px' }}>
            <svg viewBox="0 0 110 90" className="w-24 h-20 overflow-visible" style={{ filter: isComplete ? 'drop-shadow(0 0 6px rgba(232,109,156,0.5))' : 'none' }}>
              <defs>
                {/* animation สำหรับแต่ละ step */}
                <style>{`
                  .sway1 { animation: sway 2.8s ease-in-out infinite; transform-origin: 55px 80px; }
                  .sway2 { animation: sway 3.2s ease-in-out infinite 0.4s; transform-origin: 22px 80px; }
                  .sway3 { animation: sway 2.5s ease-in-out infinite 0.8s; transform-origin: 88px 80px; }
                  .sway4 { animation: sway 3.6s ease-in-out infinite 0.2s; transform-origin: 33px 80px; }
                  .sway5 { animation: sway 2.9s ease-in-out infinite 1s; transform-origin: 77px 80px; }
                  @keyframes sway {
                    0%,100% { transform: rotate(0deg); }
                    30% { transform: rotate(3deg); }
                    70% { transform: rotate(-3deg); }
                  }
                  .cloud-drift { animation: cloudDrift 4s ease-in-out infinite; }
                  @keyframes cloudDrift {
                    0%,100% { transform: translateX(0); }
                    50% { transform: translateX(3px); }
                  }
                  .wall-appear { animation: wallAppear 0.5s ease-out forwards; }
                  @keyframes wallAppear {
                    from { transform: scaleY(0); transform-origin: bottom; }
                    to { transform: scaleY(1); transform-origin: bottom; }
                  }
                  .roof-appear { animation: roofDrop 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards; }
                  @keyframes roofDrop {
                    from { transform: translateY(-12px); opacity: 0; }
                    to { transform: translateY(0); opacity: 1; }
                  }
                  .detail-pop { animation: detailPop 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards; }
                  @keyframes detailPop {
                    from { transform: scale(0.5); opacity: 0; }
                    to { transform: scale(1); opacity: 1; }
                  }
                  .sun-spin { animation: sunSpin 8s linear infinite; transform-origin: 22px 18px; }
                  @keyframes sunSpin {
                    from { transform: rotate(0deg); }
                    to { transform: rotate(360deg); }
                  }
                  .smoke1 { animation: smokeRise 2s ease-in-out infinite; }
                  .smoke2 { animation: smokeRise 2s ease-in-out infinite 0.6s; }
                  .smoke3 { animation: smokeRise 2s ease-in-out infinite 1.2s; }
                  @keyframes smokeRise {
                    0% { transform: translateY(0) scale(1); opacity: 0.5; }
                    100% { transform: translateY(-10px) scale(1.5); opacity: 0; }
                  }
                  .bird1 { animation: birdFly 5s ease-in-out infinite; }
                  .bird2 { animation: birdFly 5s ease-in-out infinite 1.5s; }
                  @keyframes birdFly {
                    0% { transform: translateX(-4px) translateY(0); }
                    50% { transform: translateX(4px) translateY(-3px); }
                    100% { transform: translateX(-4px) translateY(0); }
                  }
                  .grass-wave { animation: grassWave 2s ease-in-out infinite; transform-origin: center bottom; }
                  @keyframes grassWave {
                    0%,100% { transform: scaleX(1) rotate(0deg); }
                    50% { transform: scaleX(1.05) rotate(1deg); }
                  }
                  .heart-pulse { animation: heartPulse 1.5s ease-in-out infinite; transform-origin: 55px 26px; }
                  @keyframes heartPulse {
                    0%,100% { transform: scale(1); }
                    50% { transform: scale(1.25); }
                  }
                `}</style>
              </defs>

              {/* ====== STEP 1: พื้นที่ว่าง มีต้นไม้และหญ้า ====== */}
              {step >= 1 && (
                <g>
                  {/* พื้นดิน */}
                  <rect x="10" y="78" width="90" height="10" rx="3" fill="#C8E8A0" opacity="0.9" />
                  <rect x="10" y="78" width="90" height="4" rx="3" fill="#A8D070" opacity="0.6" />

                  {/* หญ้าคลื่น */}
                  <g className="grass-wave">
                    <path d="M15,78 Q18,72 21,78" fill="none" stroke="#78B840" strokeWidth="1.5" strokeLinecap="round" opacity="0.8" />
                    <path d="M28,78 Q30,74 32,78" fill="none" stroke="#78B840" strokeWidth="1.5" strokeLinecap="round" opacity="0.7" />
                    <path d="M48,78 Q51,73 54,78" fill="none" stroke="#78B840" strokeWidth="1.5" strokeLinecap="round" opacity="0.8" />
                    <path d="M68,78 Q71,74 74,78" fill="none" stroke="#78B840" strokeWidth="1.5" strokeLinecap="round" opacity="0.7" />
                    <path d="M85,78 Q87,73 89,78" fill="none" stroke="#78B840" strokeWidth="1.5" strokeLinecap="round" opacity="0.8" />
                  </g>

                  {/* ต้นไม้ใหญ่กลาง */}
                  <g className="sway1">
                    <rect x="53" y="58" width="4" height="20" rx="1.5" fill={brown} opacity="0.8" />
                    <circle cx="55" cy="50" r="12" fill="#B8D994" opacity="0.85" />
                    <circle cx="49" cy="55" r="8" fill="#C8E8A4" opacity="0.7" />
                    <circle cx="61" cy="55" r="8" fill="#A8CC84" opacity="0.7" />
                    <circle cx="55" cy="44" r="7" fill="#C8E8A4" opacity="0.75" />
                  </g>

                  {/* ต้นไม้เล็กซ้าย */}
                  <g className="sway2">
                    <rect x="20" y="66" width="3" height="13" rx="1" fill={brown} opacity="0.7" />
                    <circle cx="21.5" cy="61" r="8" fill="#B8D994" opacity="0.8" />
                    <circle cx="17" cy="64" r="5" fill="#C8E8A4" opacity="0.65" />
                    <circle cx="26" cy="64" r="5" fill="#A8CC84" opacity="0.65" />
                  </g>

                  {/* ต้นไม้เล็กขวา */}
                  <g className="sway3">
                    <rect x="86" y="66" width="3" height="13" rx="1" fill={brown} opacity="0.7" />
                    <circle cx="87.5" cy="61" r="8" fill="#B8D994" opacity="0.8" />
                    <circle cx="83" cy="64" r="5" fill="#C8E8A4" opacity="0.65" />
                    <circle cx="92" cy="64" r="5" fill="#A8CC84" opacity="0.65" />
                  </g>

                  {/* ดอกไม้พื้น */}
                  <g className="sway4">
                    <circle cx="37" cy="77" r="2.5" fill={pink} opacity="0.85" />
                    <circle cx="37" cy="74" r="1.5" fill="#fff" opacity="0.9" />
                  </g>
                  <g className="sway5">
                    <circle cx="73" cy="77" r="2" fill={softPink} opacity="0.85" />
                    <circle cx="73" cy="74.5" r="1.2" fill="#fff" opacity="0.9" />
                  </g>

                  {/* นก 2 ตัว */}
                  <g className="bird1">
                    <path d="M30,28 Q32,25 34,28" fill="none" stroke={purple} strokeWidth="1.2" strokeLinecap="round" opacity="0.6" />
                  </g>
                  <g className="bird2">
                    <path d="M40,22 Q42,19 44,22" fill="none" stroke={purple} strokeWidth="1.2" strokeLinecap="round" opacity="0.5" />
                  </g>

                  {/* เมฆลอย */}
                  <g className="cloud-drift" opacity="0.55">
                    <ellipse cx="75" cy="20" rx="10" ry="5" fill="#fff" />
                    <ellipse cx="70" cy="22" rx="6" ry="4" fill="#fff" />
                    <ellipse cx="81" cy="22" rx="6" ry="4" fill="#fff" />
                  </g>

    const CalendarView = React.memo(({ currentMonth, setCurrentMonth, selectedDate, setSelectedDate, today, tasks }) => {
      const year = currentMonth.getFullYear();
      const month = currentMonth.getMonth();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const firstDay = new Date(year, month, 1).getDay();

      const days = [];
      for (let i = 0; i < firstDay; i++) days.push(null);
      for (let i = 1; i <= daysInMonth; i++) days.push(i);

      const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

      return (
        <div className="backdrop-blur-xl rounded-[32px] p-5 shadow-[0_12px_30px_rgba(232,109,156,0.2)] mb-5 animate-fadeIn" style={{ backgroundColor: `${COLORS.calendarBg}e6`, borderWidth: '4px', borderColor: COLORS.cardBorder }}>
          <div className="flex justify-between items-center mb-4 px-2">
            <button onClick={() => setCurrentMonth(new Date(year, month - 1, 1))} className="p-1.5 rounded-full transition-colors" style={{ color: '#6E75D9' }}><IconChevronLeft size={20}/></button>
            <h3 className="font-black text-[16px] tracking-widest" style={{ color: '#454CB6' }}>{monthNames[month]} {year}</h3>
            <button onClick={() => setCurrentMonth(new Date(year, month + 1, 1))} className="p-1.5 rounded-full transition-colors" style={{ color: '#6E75D9' }}><IconChevronRight size={20}/></button>

          <div className="grid grid-cols-7 gap-1 text-center mb-3">

            {days.map((day, index) => {
              if (!day) return <div key={`empty-${index}`} className="h-10"></div>;
              
              const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
              const isSelected = selectedDate === dateStr;
              const isToday = today === dateStr;
              const hasTasks = tasks.some(t => t.deadline === dateStr);

              return (
                <div key={dateStr} className="flex justify-center items-center h-10">
                  <div
                    onClick={() => setSelectedDate(dateStr)}
                    className={`relative w-10 h-10 flex flex-col items-center justify-center cursor-pointer transition-all rounded-full ${

                    )}

                </div>
              );
            })}

        </div>
      );

      const [profileImage, setProfileImage] = useState(null);
      const [tempImageUrl, setTempImageUrl] = useState('');
      const [bannerImage, setBannerImage] = useState(null);
      const [tempBannerUrl, setTempBannerUrl] = useState('');
      const [isBannerVisible, setIsBannerVisible] = useState(true);
      const [selectedNextDate, setSelectedNextDate] = useState('');
      const [isBouncing, setIsBouncing] = useState(false);

      const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyCPh3eWxzqdynq8kzvjr7B4NC9SKmilOyb_2qslb0mHx0hsOYxB13wOs5dG6FqfgQT/exec";

      const fetchAPI = async (payload) => {
        try {
          const res = await fetch(WEB_APP_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(payload)
          });
          return await res.json();
        } catch (error) {
          console.error("API Error:", error);
          throw error;
        }
      };

      useEffect(() => {
        document.title = "KAWIS STUDIO";
        fetch(WEB_APP_URL + "?action=getInitialData")
          .then(res => res.json())
          .then(response => {
            if (response.status === 'success') {
              const formattedTasks = (response.data.tasks || []).map(t => {
                 if (!TASK_STATUSES.some(s => s.id === t.status)) {
                    return {...t, status: 'status_1'};
                 }
                 return t;
              });
              setTasks(formattedTasks);
              if (response.data.taskTypes && response.data.taskTypes.length > 0) setTaskTypes(response.data.taskTypes);
              if (response.data.channels && response.data.channels.length > 0) setChannels(response.data.channels);
              if (response.data.profileImage) setProfileImage(response.data.profileImage);
              if (response.data.bannerImage) setBannerImage(response.data.bannerImage);
              if (response.data.bannerVisible !== undefined) setIsBannerVisible(response.data.bannerVisible);
              if (response.data.lockedNextDate) setSelectedNextDate(response.data.lockedNextDate);
            }
            setIsLoading(false);
          })
          .catch(error => {
            console.error("Error loading data:", error);
            setIsLoading(false);
          });
      }, []);

      const handleAdminLogin = (e) => {
        e.preventDefault();
        setIsVerifyingAuth(true);
        setAuthError(false);
        fetchAPI({ action: 'verifyAdminPassword', inputPassword: password })
          .then(res => {
            setIsVerifyingAuth(false);
            if (res.isValid) {
              setIsAdmin(true); setShowAuthModal(false); setPassword(''); setAuthError(false);
            } else setAuthError(true);
          })
          .catch(() => { setIsVerifyingAuth(false); setAuthError(true); });
      };

      const handleSetManualDate = useCallback((dateVal) => {
        setSelectedNextDate(dateVal);
        fetchAPI({ action: 'saveLockedNextDate', dateStr: dateVal });
      }, []);

      const today = useMemo(() => {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
      }, []);

      const todayTasks = useMemo(() => tasks.filter(t => t.deadline === today), [tasks, today]);
      const doneToday = useMemo(() => todayTasks.filter(t => t.status === 'status_5').length, [todayTasks]);
      const progress = todayTasks.length === 0 ? 0 : Math.round((doneToday / todayTasks.length) * 100);

      const nextQueueDate = useMemo(() => {
        if (selectedNextDate) return selectedNextDate;
        let checkDate = new Date();
        for (let i = 0; i < 365; i++) {
          const y = checkDate.getFullYear();
          const m = String(checkDate.getMonth() + 1).padStart(2, '0');
          const d = String(checkDate.getDate()).padStart(2, '0');
          const dateStr = `${y}-${m}-${d}`;
          const tasksOnDate = tasks.filter(t => t.deadline === dateStr);
          if (tasksOnDate.length === 0) return dateStr;
          checkDate.setDate(checkDate.getDate() + 1);
        }
        return today;
      }, [tasks, selectedNextDate]);

      const waitingCount = useMemo(() => tasks.filter(t => t.status !== 'status_5').length, [tasks]);

      const cycleStatus = useCallback((e, id) => {
        e.stopPropagation();
        setTasks(prev => prev.map(t => {
          if (t.id === id) {
            const currentIndex = TASK_STATUSES.findIndex(s => s.id === t.status);
            const nextIndex = currentIndex < TASK_STATUSES.length - 1 ? currentIndex + 1 : 0;
            const newStatus = TASK_STATUSES[nextIndex].id;
            fetchAPI({ action: 'updateTaskStatus', taskId: id, newStatus: newStatus });
            return { ...t, status: newStatus };
          }
          return t;
        }));
      }, []);

      const handleEditTask = useCallback((task) => {
        setEditingTask(task);
        setShowModal(true);
      }, []);

      const handleSaveTask = (e) => {
        e.preventDefault();
        setIsSaving(true);
        const formData = new FormData(e.target);
        const taskData = {
          id: editingTask ? editingTask.id : null,
          title: '',
          client: formData.get('client'),
          type: formData.get('type'),
          channel: formData.get('channel'),
          priority: formData.get('priority') ? 'urgent' : 'normal',
          deadline: formData.get('deadline'),
          details: formData.get('details'),
          status: formData.get('status') || 'status_1',
        };
        fetchAPI({ action: 'saveOrUpdateTask', task: taskData })
          .then(res => {
             if (res.status === 'success') {
                setTasks(prev => editingTask ? prev.map(t => t.id === res.task.id ? res.task : t) : [...prev, res.task]);
             }
             setIsSaving(false); setShowModal(false); setEditingTask(null);
          })
          .catch(() => { setIsSaving(false); });
      };

      const executeDeleteTask = () => {
        if (!taskToDelete) return;
        setIsSaving(true);
        fetchAPI({ action: 'deleteTask', taskId: taskToDelete })
          .then(() => {
             setTasks(prev => prev.filter(t => t.id !== taskToDelete));
             setIsSaving(false); setShowModal(false); setEditingTask(null); setTaskToDelete(null);
          })
          .catch(() => { setIsSaving(false); });
      };

      const toggleBannerVisibility = (visible) => {
        setIsBannerVisible(visible);
        fetchAPI({ action: 'saveBannerVisibility', isVisible: visible });
      };

      const triggerBounce = useCallback(() => { setIsBouncing(true); setTimeout(() => setIsBouncing(false), 500); }, []);
      const handleImageUpload = useCallback(() => { setShowImageModal(true); }, []);

      const filteredAllTasks = useMemo(() => tasks.filter(t => {
        const matchSearch = t.type.toLowerCase().includes(searchQuery.toLowerCase()) || t.client.toLowerCase().includes(searchQuery.toLowerCase());
        const matchFilter = filterType === 'all' || (filterType === 'pending' && t.status !== 'status_5') || (filterType === 'done' && t.status === 'status_5');
        return matchSearch && matchFilter;
      }).slice().reverse(), [tasks, searchQuery, filterType]);

      const displayedTasks = isCalendarView
        ? filteredAllTasks.filter(t => t.deadline === selectedDate)
        : filteredAllTasks;

      if (isLoading) {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center relative overflow-hidden" style={{ backgroundColor: COLORS.bg }}>
             <DynamicBackground />
             <div className="flex flex-col items-center z-10 animate-breathe">
               <div className="flex items-center gap-1.5 px-6 py-2.5 backdrop-blur-sm rounded-full shadow-sm" style={{ backgroundColor: `${COLORS.buttonBg}99`, borderWidth: '2px', borderColor: COLORS.cardBorder }}>
                 <p className="text-[12px] font-black tracking-widest" style={{ color: COLORS.textMain }}>กำลังโหลดข้อมูล</p>
                 <div className="flex gap-1 pt-1 -ml-1">
                   <span className="w-1.5 h-1.5 rounded-full animate-bounce" style={{ backgroundColor: '#E86D9C', animationDelay: '0s' }}></span>
                   <span className="w-1.5 h-1.5 rounded-full animate-bounce" style={{ backgroundColor: '#454CB6', animationDelay: '0.15s' }}></span>
                   <span className="w-1.5 h-1.5 rounded-full animate-bounce" style={{ backgroundColor: '#6E75D9', animationDelay: '0.3s' }}></span>
                 </div>
               </div>
             </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen font-sans relative" style={{ backgroundColor: COLORS.bg, color: COLORS.textMain }}>
          <DynamicBackground />
          <div className="max-w-md mx-auto min-h-screen relative pb-28">
            <Header isAdmin={isAdmin} setIsAdmin={setIsAdmin} setShowAuthModal={setShowAuthModal} handleImageUpload={handleImageUpload} profileImage={profileImage} />

            {/* Banner Section */}
            <div className="px-5 relative z-10 mb-4">
               {bannerImage && isBannerVisible && (
                 <div className="relative group w-full h-32 rounded-[24px] overflow-hidden shadow-sm backdrop-blur-sm" style={{ borderWidth: '3px', borderColor: COLORS.cardBorder, backgroundColor: `${COLORS.cardWhite}66` }}>
                    <img src={bannerImage} alt="Shop Banner" className="w-full h-full object-cover" />
                    <div className="absolute top-2 right-2 flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                       {isAdmin && (
                         <button onClick={() => setShowBannerModal(true)} className="p-1.5 backdrop-blur-md rounded-full shadow-sm transition-colors" style={{ backgroundColor: `${COLORS.bannerOverlayBg}e6`, color: '#6E75D9' }} title="เปลี่ยนแบนเนอร์">
                            <IconImage size={16} />
                         </button>
                       )}
                       {isAdmin && (
                         <button onClick={() => toggleBannerVisibility(false)} className="p-1.5 backdrop-blur-md rounded-full shadow-sm transition-colors" style={{ backgroundColor: `${COLORS.bannerOverlayBg}e6`, color: '#E86D9C' }} title="ซ่อนแบนเนอร์">
                            <IconEyeOff size={16} />
                         </button>
                       )}
                    </div>
                 </div>
               )}
               {bannerImage && !isBannerVisible && isAdmin && (
                 <div className="flex justify-end mb-1">
                    <button onClick={() => toggleBannerVisibility(true)} className="text-[10px] font-bold flex items-center gap-1 backdrop-blur-sm px-3 py-1.5 rounded-full shadow-sm hover:opacity-80 transition-colors" style={{ color: COLORS.textSoft, backgroundColor: `${COLORS.buttonBg}99`, borderWidth: '1px', borderColor: COLORS.cardBorder }}>
                       <IconEye size={12} /> แสดงแบนเนอร์
                    </button>
                 </div>
               )}
               {!bannerImage && isAdmin && (
                 <div onClick={() => setShowBannerModal(true)} className="w-full h-16 rounded-[24px] border-[3px] border-dashed backdrop-blur-sm flex items-center justify-center cursor-pointer hover:opacity-80 transition-colors" style={{ borderColor: COLORS.cardBorder, backgroundColor: `${COLORS.cardWhite}66` }}>
                    <span className="text-[11px] font-bold flex items-center gap-2" style={{ color: COLORS.textSoft }}><IconPlus size={16}/> เพิ่มรูปแบนเนอร์ร้าน</span>
                 </div>
               )}
            </div>

            {/* Main Content */}
            <div className="px-5 relative z-10">
              {view === 'dashboard' ? (
                <div className="animate-fadeIn">
                  <div className="flex gap-3 h-28 mb-4">
                    <div className="flex-[1.6]">
                      <CompactStats isAdmin={isAdmin} selectedNextDate={selectedNextDate} nextQueueDate={nextQueueDate} handleSetManualDate={handleSetManualDate} waitingCount={waitingCount} />
                    </div>
                    <div className="flex-1">
                      {/* ใช้ ProgressHouse แทน ProgressFlower */}
                      <ProgressHouse progress={progress} todayTasksLength={todayTasks.length} doneToday={doneToday} triggerBounce={triggerBounce} isBouncing={isBouncing} />
                    </div>
                  </div>
                  <div className="flex items-center justify-between mb-2.5 ml-1">
                    <h2 className="text-[10px] font-black text-gray-400 italic uppercase tracking-[0.3em] opacity-60">Today's Task</h2>
                    <div className="h-[1px] flex-1 mx-3" style={{ background: 'linear-gradient(to right, #FFD2E666, transparent)' }}></div>
                  </div>
                  <div className="space-y-1">
                    {todayTasks.length > 0 ? todayTasks.map((t) => <TaskCard key={t.id} task={t} isAdmin={isAdmin} onEdit={handleEditTask} onCycleStatus={cycleStatus} queueNumber={tasks.indexOf(t) + 1} />) : (
                      <div className="text-center py-10 rounded-[28px] border-2 border-dashed" style={{ backgroundColor: `${COLORS.cardWhite}4d`, borderColor: '#FFD2E680' }}>
                        <p className="text-[9px] font-bold uppercase tracking-widest opacity-40" style={{ color: COLORS.pinkDeep }}>Sky is clear ✨</p>
                      </div>
                    )}
                  </div>
                </div>
              ) : (
                <div className="animate-fadeIn">
                  <div className="relative mb-4">
                    <div className="absolute left-4 top-1/2 -translate-y-1/2 opacity-50" style={{ color: COLORS.blueDeep }}><IconSearch size={16} /></div>
                    <input type="text" placeholder="ค้นหาคิวงาน..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className="w-full rounded-[22px] py-3 pl-10 pr-4 outline-none text-xs shadow-lg transition-all backdrop-blur-sm" style={{ backgroundColor: `${COLORS.searchInputBg}cc`, borderWidth: '2px', borderColor: '#FFD2E6', boxShadow: '0 4px 15px rgba(232,109,156,0.1)' }} />
                  </div>

                  <div className="flex gap-2 mb-3 p-1.5 rounded-full backdrop-blur-md shadow-sm" style={{ backgroundColor: `${COLORS.filterBarBg}80`, borderWidth: '3px', borderColor: COLORS.cardBorder }}>
                      <button onClick={() => setFilterType('all')} className="flex-1 text-[9px] font-black py-2 rounded-full transition-all tracking-wider" style={{ color: filterType === 'all' ? COLORS.pinkDeep : '#9ca3af', backgroundColor: filterType === 'all' ? COLORS.buttonBg : 'transparent' }}>ทั้งหมด</button>
                      <button onClick={() => setFilterType('pending')} className="flex-1 text-[9px] font-black py-2 rounded-full transition-all tracking-wider" style={{ color: filterType === 'pending' ? COLORS.orangeDeep : '#9ca3af', backgroundColor: filterType === 'pending' ? COLORS.buttonBg : 'transparent' }}>ยังไม่เสร็จ</button>
                      <button onClick={() => setFilterType('done')} className="flex-1 text-[9px] font-black py-2 rounded-full transition-all tracking-wider" style={{ color: filterType === 'done' ? COLORS.blueDeep : '#9ca3af', backgroundColor: filterType === 'done' ? COLORS.buttonBg : 'transparent' }}>เสร็จแล้ว</button>
                  </div>

                  <div className="flex justify-end mb-4 pr-1">
                    <button onClick={() => {
                      const newView = !isCalendarView;
                      setIsCalendarView(newView);
                      if(newView) setFilterType('all');
                    }} className="flex items-center gap-1.5 px-3 py-1.5 backdrop-blur-md rounded-full text-[9px] font-black uppercase tracking-widest transition-all active:scale-95" style={{ color: COLORS.textSoft, backgroundColor: `${COLORS.buttonBg}cc`, borderWidth: '2px', borderColor: COLORS.cardBorder, boxShadow: '0 4px 10px rgba(232,109,156,0.15)' }}>
                      {isCalendarView ? <><IconList size={14} /> รูปแบบรายการ</> : <><IconCalendar size={14} /> รูปแบบปฏิทิน</>}
                    </button>
                  </div>

                  {isCalendarView && <CalendarView currentMonth={currentMonth} setCurrentMonth={setCurrentMonth} selectedDate={selectedDate} setSelectedDate={setSelectedDate} today={today} tasks={tasks} />}

                  <div className="space-y-1">
                    {displayedTasks.length > 0 ? displayedTasks.map((t) => <TaskCard key={t.id} task={t} isAdmin={isAdmin} onEdit={handleEditTask} onCycleStatus={cycleStatus} queueNumber={tasks.indexOf(t) + 1} />) : (
                      <div className="text-center py-10 rounded-[28px] border-[4px] border-dashed shadow-sm mt-4" style={{ backgroundColor: `${COLORS.cardWhite}4d`, borderColor: COLORS.cardBorder }}>
                        <p className="text-[10px] font-black uppercase tracking-widest opacity-60" style={{ color: COLORS.textSoft }}>
                          {isCalendarView ? "วันนี้คิวว่าง ✨" : "No records found ✨"}
                        </p>
                      </div>
                    )}
                  </div>
                </div>
              )}
            </div>

            {/* Bottom Navigation Bar */}
            <div className="fixed bottom-6 left-1/2 -translate-x-1/2 w-full max-w-[210px] z-50">
              <div className="backdrop-blur-xl rounded-full h-14 flex items-center justify-between px-6 relative" style={{ backgroundColor: `${COLORS.navBarBg}99`, borderWidth: '1px', borderColor: COLORS.cardBorder, boxShadow: '0 8px 32px rgba(69,76,182,0.2)' }}>
                  <button onClick={() => setView('dashboard')} className={`p-1 transition-all ${view === 'dashboard' ? 'scale-110' : 'opacity-40'}`} style={{ color: view === 'dashboard' ? COLORS.pinkDeep : '#9ca3af' }}>
                    <IconHome size={22} />
                  </button>
                  <div className="w-8"></div>
                  <button onClick={() => setView('all')} className={`p-1 transition-all ${view === 'all' ? 'scale-110' : 'opacity-40'}`} style={{ color: view === 'all' ? COLORS.blueDeep : '#9ca3af' }}>
                    <IconFileText size={22} />
                  </button>
                  {isAdmin && (
                    <div className="absolute left-1/2 -translate-x-1/2 -top-6">
                      <button onClick={() => { setEditingTask(null); setShowModal(true); }} className="w-14 h-14 rounded-full text-white flex items-center justify-center active:scale-95 transition-transform" style={{ backgroundColor: '#454CB6', borderWidth: '4px', borderColor: COLORS.cardBorder, boxShadow: '0 8px 24px rgba(69,76,182,0.5)' }}>
                        <IconPlus size={24} />
                      </button>
                    </div>
                  )}
              </div>
            </div>

            {/* MODAL: เพิ่ม/แก้ไขงาน */}
            {showModal && (
              <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/10 backdrop-blur-[2px] animate-fadeIn">
                <form onSubmit={handleSaveTask} className="backdrop-blur-xl w-full max-w-xs rounded-[35px] p-6 shadow-2xl animate-slideUp" style={{ backgroundColor: `${COLORS.modalBg}f2`, borderWidth: '1px', borderColor: COLORS.cardBorder }}>
                   <h3 className="text-sm font-black mb-4 text-center" style={{ color: COLORS.textMain }}>{editingTask ? 'แก้ไขคิวงาน ✨' : 'เพิ่มคิวใหม่ ✨'}</h3>
                   <div className="space-y-2 relative">
                     {isSaving && (
                        <div className="absolute inset-0 z-50 flex flex-col items-center justify-center rounded-2xl backdrop-blur-sm" style={{ backgroundColor: `${COLORS.modalBg}cc` }}>
                           <IconLoader size={32} className="animate-spin-slow" style={{ color: COLORS.pinkDeep }} />
                           <span className="text-[10px] font-black mt-2 text-gray-500">กำลังบันทึก...</span>
                        </div>
                     )}
                     <div className="flex justify-end mb-1">
                       <label className="flex items-center cursor-pointer gap-2 px-3 py-1.5 rounded-full shadow-sm" style={{ borderWidth: '1px', borderColor: '#FFD2E6', backgroundColor: COLORS.buttonBg }}>
                         <span className="text-[10px] font-bold text-gray-500">คิวด่วน 🔥</span>
                         <div className="relative">
                           <input type="checkbox" name="priority" value="urgent" defaultChecked={editingTask?.priority === 'urgent'} className="sr-only peer" />
                           <div className="w-8 h-4 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:bg-[#454CB6]"></div>
                         </div>
                       </label>
                     </div>
                     <input name="client" required defaultValue={editingTask?.client || ''} className="w-full p-3.5 rounded-2xl outline-none text-[11px] shadow-sm transition-all" style={{ backgroundColor: COLORS.cardInner, borderWidth: '1px', borderColor: '#FFD2E6' }} placeholder="ชื่อลูกค้า" />
                     
                     <div className="flex flex-col gap-2">
                        <input list="taskTypesList" name="type" required defaultValue={editingTask?.type || ''} className="w-full p-3.5 rounded-2xl font-black text-[10px] outline-none shadow-sm" style={{ backgroundColor: COLORS.cardInner, borderWidth: '1px', borderColor: '#FFD2E6' }} placeholder="ประเภทงาน" />
                        <datalist id="taskTypesList">
                          {taskTypes.map(type => <option key={type} value={type} />)}
                        </datalist>
                        
                        <input list="channelsList" name="channel" required defaultValue={editingTask?.channel || ''} className="w-full p-3.5 rounded-2xl font-black text-[10px] outline-none shadow-sm" style={{ backgroundColor: COLORS.cardInner, borderWidth: '1px', borderColor: '#D4D6F5' }} placeholder="ช่องทาง" />
                        <datalist id="channelsList">
                          {channels.map(ch => <option key={ch} value={ch} />)}
                        </datalist>
                     </div>

                     <textarea name="details" rows="2" defaultValue={editingTask?.details || ''} className="w-full p-3.5 rounded-2xl outline-none text-[11px] shadow-sm transition-all resize-none" style={{ backgroundColor: COLORS.cardInner, borderWidth: '1px', borderColor: '#FFD2E6' }} placeholder="รายละเอียดเพิ่มเติม (ถ้ามี)..."></textarea>
                     
                     <select name="status" defaultValue={editingTask?.status || 'status_1'} className="w-full p-3.5 rounded-2xl font-black text-[10px] outline-none shadow-sm cursor-pointer" style={{ backgroundColor: COLORS.cardInner, borderWidth: '1px', borderColor: '#D4D6F5', color: COLORS.blueDeep }}>
                        {TASK_STATUSES.map(s => <option key={s.id} value={s.id}>{s.label}</option>)}
                     </select>

                     <div className="flex items-center justify-between p-1.5 pl-4 rounded-2xl border transition-all hover:shadow-sm group mt-1" style={{ backgroundColor: '#FFF5F9', borderColor: '#FFD2E6' }}>
                       <div className="flex items-center gap-1.5 text-[10px] uppercase tracking-wider font-black" style={{ color: COLORS.pinkDeep }}>
                         <IconCalendar size={12} /><span>Deadline</span>
                       </div>
                       <input name="deadline" type="date" required defaultValue={editingTask?.deadline || nextQueueDate} className="w-32 p-2.5 rounded-xl outline-none text-[10px] font-black shadow-sm transition-all cursor-pointer" style={{ backgroundColor: COLORS.cardInner, borderWidth: '1px', borderColor: '#FFD2E6', color: '#E86D9C' }} />
                     </div>
                     <div className="flex items-center gap-2 mt-3">
                       <button type="submit" className="flex-1 py-3.5 rounded-2xl font-black text-xs text-white shadow-lg active:scale-95 transition-all disabled:opacity-50" style={{ backgroundColor: '#454CB6' }}>บันทึกคิวงาน</button>
                       {editingTask && (
                         <button type="button" onClick={() => setTaskToDelete(editingTask.id)} className="w-12 h-[44px] flex items-center justify-center rounded-2xl bg-red-50 text-red-400 border border-red-100 hover:bg-red-100 active:scale-95 transition-all shadow-sm" title="ลบคิวงาน">
                           <IconTrash size={18} />
                         </button>
                       )}
                     </div>
                     <button type="button" onClick={() => { setShowModal(false); setEditingTask(null); }} className="w-full text-[9px] font-bold text-gray-300 mt-2 uppercase tracking-widest">Close</button>
                   </div>
                </form>
              </div>
            )}

            {/* MODAL: Login Admin */}
            {showAuthModal && (
              <div className="fixed inset-0 z-[110] flex items-center justify-center p-6 bg-black/10 backdrop-blur-[2px] animate-fadeIn">
                <form onSubmit={handleAdminLogin} className="backdrop-blur-xl w-full max-w-xs rounded-[35px] p-6 shadow-2xl animate-slideUp" style={{ backgroundColor: `${COLORS.modalBg}f2`, borderWidth: '1px', borderColor: COLORS.cardBorder }}>
                   <h3 className="text-sm font-black mb-4 text-center" style={{ color: COLORS.textMain }}>เข้าสู่ระบบ Admin</h3>
                   <div className="space-y-2">
                     <input type="password" required value={password} onChange={(e) => { setPassword(e.target.value); setAuthError(false); }} className="w-full p-3.5 rounded-2xl outline-none text-[11px] shadow-sm transition-all text-center tracking-widest" style={{ backgroundColor: COLORS.cardInner, borderWidth: '1px', borderColor: authError ? '#f87171' : '#FFD2E6' }} placeholder="ใส่รหัสผ่าน" disabled={isVerifyingAuth} />
                     {authError && <p className="text-red-400 text-[9px] text-center font-bold">รหัสผ่านไม่ถูกต้อง!</p>}
                     <button type="submit" disabled={isVerifyingAuth} className="w-full h-11 rounded-2xl font-black text-xs mt-3 text-white shadow-lg flex items-center justify-center active:scale-95 transition-all disabled:opacity-70" style={{ backgroundColor: '#454CB6' }}>
                        {isVerifyingAuth ? <IconLoader size={16} className="animate-spin-slow" /> : 'Login'}
                     </button>
                     <button type="button" onClick={() => { setShowAuthModal(false); setAuthError(false); setPassword(''); }} className="w-full text-[9px] font-bold text-gray-300 mt-1 uppercase tracking-widest" disabled={isVerifyingAuth}>Close</button>
                   </div>
                </form>
              </div>
            )}

            {/* MODAL: เปลี่ยนรูปโปรไฟล์ */}
            {showImageModal && (
              <div className="fixed inset-0 z-[120] flex items-center justify-center p-6 bg-black/10 backdrop-blur-[2px] animate-fadeIn">
                <form onSubmit={(e) => {
                    e.preventDefault();
                    if (tempImageUrl) {
                        let finalUrl = tempImageUrl;
                        const match = finalUrl.match(/\/file\/d\/([a-zA-Z0-9_-]+)/) || finalUrl.match(/id=([a-zA-Z0-9_-]+)/) || finalUrl.match(/\/d\/([a-zA-Z0-9_-]+)/);
                        if (match && match[1]) { finalUrl = `https://lh3.googleusercontent.com/d/${match[1]}`; }
                        setProfileImage(finalUrl);
                        fetchAPI({ action: 'saveProfileImage', imageUrl: finalUrl });
                    }
                    setShowImageModal(false);
                    setTempImageUrl('');
                }} className="backdrop-blur-xl w-full max-w-xs rounded-[35px] p-6 shadow-2xl animate-slideUp" style={{ backgroundColor: `${COLORS.modalBg}f2`, borderWidth: '1px', borderColor: COLORS.cardBorder }}>
                   <h3 className="text-sm font-black mb-4 text-center" style={{ color: COLORS.textMain }}>เปลี่ยนรูปโปรไฟล์ 🐰</h3>
                   <div className="space-y-2">
                     <input type="url" required value={tempImageUrl} onChange={(e) => setTempImageUrl(e.target.value)} className="w-full p-3.5 rounded-2xl outline-none text-[11px] shadow-sm transition-all text-center" style={{ backgroundColor: COLORS.cardInner, borderWidth: '1px', borderColor: '#FFD2E6' }} placeholder="วางลิงก์รูปภาพ Google Drive ที่นี่..." />
                     <button type="submit" className="w-full py-3.5 rounded-2xl font-black text-xs mt-3 text-white shadow-lg active:scale-95 transition-all" style={{ backgroundColor: '#454CB6' }}>Save Image</button>
                     <button type="button" onClick={() => { setShowImageModal(false); setTempImageUrl(''); }} className="w-full text-[9px] font-bold text-gray-300 mt-1 uppercase tracking-widest">Close</button>
                   </div>
                </form>
              </div>
            )}

            {/* MODAL: เปลี่ยนแบนเนอร์ร้าน */}
            {showBannerModal && (
              <div className="fixed inset-0 z-[120] flex items-center justify-center p-6 bg-black/10 backdrop-blur-[2px] animate-fadeIn">
                <form onSubmit={(e) => {
                    e.preventDefault();
                    if (tempBannerUrl) {
                        let finalUrl = tempBannerUrl;
                        const match = finalUrl.match(/\/file\/d\/([a-zA-Z0-9_-]+)/) || finalUrl.match(/id=([a-zA-Z0-9_-]+)/) || finalUrl.match(/\/d\/([a-zA-Z0-9_-]+)/);
                        if (match && match[1]) { finalUrl = `https://lh3.googleusercontent.com/d/${match[1]}`; }
                        setBannerImage(finalUrl);
                        toggleBannerVisibility(true);
                        fetchAPI({ action: 'saveBannerImage', imageUrl: finalUrl });
                    }
                    setShowBannerModal(false);
                    setTempBannerUrl('');
                }} className="backdrop-blur-xl w-full max-w-xs rounded-[35px] p-6 shadow-2xl animate-slideUp" style={{ backgroundColor: `${COLORS.modalBg}f2`, borderWidth: '1px', borderColor: COLORS.cardBorder }}>
                   <h3 className="text-sm font-black mb-4 text-center" style={{ color: COLORS.textMain }}>เปลี่ยนแบนเนอร์</h3>
                   <div className="space-y-2">
                     <input type="url" required value={tempBannerUrl} onChange={(e) => setTempBannerUrl(e.target.value)} className="w-full p-3.5 rounded-2xl outline-none text-[11px] shadow-sm transition-all text-center" style={{ backgroundColor: COLORS.cardInner, borderWidth: '1px', borderColor: '#D4D6F5' }} placeholder="วางลิงก์รูปภาพ Google Drive..." />
                     <button type="submit" className="w-full py-3.5 rounded-2xl font-black text-xs mt-3 text-white shadow-lg active:scale-95 transition-all" style={{ backgroundColor: '#454CB6' }}>Save Banner</button>
                     <button type="button" onClick={() => { setShowBannerModal(false); setTempBannerUrl(''); }} className="w-full text-[9px] font-bold text-gray-300 mt-1 uppercase tracking-widest">Close</button>
                   </div>
                </form>
              </div>
            )}

            {/* MODAL: ยืนยันการลบงาน */}
            {taskToDelete && (
              <div className="fixed inset-0 z-[200] flex items-center justify-center p-6 bg-black/20 backdrop-blur-[2px] animate-fadeIn">
                <div className="backdrop-blur-xl w-full max-w-[260px] rounded-[30px] p-6 shadow-2xl animate-slideUp text-center" style={{ backgroundColor: `${COLORS.modalBg}f2`, borderWidth: '1px', borderColor: COLORS.cardBorder }}>
                  <div className="w-14 h-14 rounded-full bg-red-50 text-red-400 flex items-center justify-center mx-auto mb-3 shadow-sm border border-red-100">
                     <IconTrash size={26} />
                  </div>
                  <h3 className="text-[14px] font-black mb-1 text-gray-800">ยืนยันการลบ?</h3>
                  <p className="text-[10px] font-bold text-gray-500 mb-5">คุณต้องการลบคิวงานนี้ใช่หรือไม่<br/>(ไม่สามารถกู้คืนได้)</p>
                  <div className="flex gap-2">
                    <button onClick={() => setTaskToDelete(null)} className="flex-1 py-3 rounded-2xl font-black text-[10px] text-gray-500 bg-gray-100 hover:bg-gray-200 active:scale-95 transition-all shadow-sm">ยกเลิก</button>
                    <button onClick={executeDeleteTask} className="flex-1 py-3 rounded-2xl font-black text-[10px] text-white bg-red-400 hover:bg-red-500 active:scale-95 transition-all shadow-sm">ลบข้อมูล</button>
                  </div>
                </div>
              </div>
            )}

          </div>

          <style>{`
            @keyframes float { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(25px, -15px); } }
            @keyframes float-reverse { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(-25px, 15px); } }
            @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
            @keyframes float-particle-1 { 0% { transform: translateY(0); opacity: 0; } 50% { opacity: 0.8; } 100% { transform: translateY(-20px); opacity: 0; } }
            @keyframes float-particle-2 { 0% { transform: translateY(0); opacity: 0; } 50% { opacity: 0.8; } 100% { transform: translateY(-15px) translateX(5px); opacity: 0; } }
            @keyframes float-particle-3 { 0% { transform: translateY(0); opacity: 0; } 50% { opacity: 0.8; } 100% { transform: translateY(-25px) translateX(-5px); opacity: 0; } }
            @keyframes bounce-slow { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
            @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
            @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
            @keyframes text-wave { 0%, 20%, 100% { transform: translateY(0px); } 10% { transform: translateY(-5px); } }
            @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
            
            @keyframes mario-jump-once {
              0% { transform: translateY(0) scale(1) rotateY(0deg); }
              40% { transform: translateY(-40px) scale(1.2) rotateY(180deg); }
              70% { transform: translateY(0) scale(1) rotateY(360deg); }
              85% { transform: translateY(-10px) scale(1) rotateY(360deg); }
              100% { transform: translateY(0) scale(1) rotateY(360deg); }
            }
            .animate-mario-jump-once {
              animation: mario-jump-once 1.2s ease-in-out forwards;
            }

            .progress-stripes {
               background-image: linear-gradient(
                 45deg,
                 rgba(255, 255, 255, 0.2) 25%,
                 transparent 25%,
                 transparent 50%,
                 rgba(255, 255, 255, 0.2) 50%,
                 rgba(255, 255, 255, 0.2) 75%,
                 transparent 75%,
                 transparent
               );
               background-size: 20px 20px;
               animation: moveStripes 1s linear infinite;
            }
            @keyframes moveStripes {
               0% { background-position: 0 0; }
               100% { background-position: 20px 0; }
            }

            .animate-float { animation: float 6s ease-in-out infinite; }
            .animate-float-reverse { animation: float-reverse 7s ease-in-out infinite; }
            .animate-breathe { animation: breathe 3s ease-in-out infinite; }
            .animate-float-particle-1 { animation: float-particle-1 2.5s ease-in-out infinite; }
            .animate-float-particle-2 { animation: float-particle-2 3s ease-in-out infinite 0.5s; }
            .animate-float-particle-3 { animation: float-particle-3 2s ease-in-out infinite 1s; }
            .animate-bounce-slow { animation: bounce-slow 2s ease-in-out infinite; }
            .animate-slideUp { animation: slideUp 0.3s ease-out; }
            .animate-fadeIn { animation: fadeIn 0.3s ease-out; }
            .animate-text-wave { animation: text-wave 2s ease-in-out infinite; }
            .animate-spin-slow { animation: spin-slow 1s linear infinite; }
          `}</style>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
